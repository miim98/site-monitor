<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UIUX 래퍼런스 & 뉴스레터 모음</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root {
    --bg: #f0f1f3;            /* 밝은 그레이 배경 */
    --card: #ffffff;
    --ink: #16181d;          /* 거의 블랙 (타이틀/포인트) */
    --text: #3a3d44;
    --muted: #9298a2;
    --border: #e6e8ec;
    --line: #eef0f3;
    --uiux: #5b6ef5;         /* UIUX = 인디고 */
    --uiux-soft: #eef0ff;
    --news: #f5910b;         /* 뉴스레터 = 주황 */
    --news-deep: #d97706;
    --news-soft: #fff3e0;
    --etc-bar: #c2c6cd;
    --add: #10b981;          /* 추가 = 초록 */
    --add-bg: #e7f9f1;
    --add-line: #d3f1e3;
    --del: #f4516c;          /* 삭제 = 빨강 */
    --del-bg: #fff0f2;
    --del-line: #ffd9df;
    --soft: #f1f2f4;
    --shadow: 0 1px 2px rgba(20,22,28,.04), 0 8px 24px rgba(20,22,28,.06);
    --radius: 18px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    min-height: 100vh; color: var(--text); background: var(--bg);
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Noto Sans KR", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 36px 20px 80px; }

  /* ── Header ── */
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .logo {
    width: 34px; height: 34px; border-radius: 10px;
    background: linear-gradient(135deg, var(--uiux), var(--news));
    display: grid; place-items: center; color: #fff; font-size: 17px;
  }
  .brand b { font-size: 1.02rem; font-weight: 800; color: var(--ink); letter-spacing: -.01em; }
  h1 { font-size: 1.9rem; font-weight: 800; letter-spacing: -.02em; color: var(--ink); margin: 0 0 6px; line-height: 1.25; }
  .sub { color: var(--muted); font-size: .92rem; }

  /* ── Tabs (블랙/그레이) ── */
  .tabs { display: flex; gap: 22px; margin: 26px 0 6px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .tab {
    background: none; border: 0; padding: 0 2px 12px; cursor: pointer; font-family: inherit;
    font-size: 1rem; font-weight: 700; color: var(--muted); position: relative; letter-spacing: -.01em;
  }
  .tab.active { color: var(--ink); }
  .tab.active::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 3px;
    background: var(--ink); border-radius: 3px;
  }
  .tab .n {
    font-size: .76rem; color: var(--text); font-weight: 800; margin-left: 5px;
    background: var(--soft); padding: 1px 7px; border-radius: 999px;
  }

  /* ── Filter chips ── */
  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0 4px; }
  .chip {
    border: 1px solid var(--border); background: var(--card); color: var(--muted);
    padding: 7px 13px; border-radius: 999px; font-size: .8rem; font-weight: 600;
    cursor: pointer; user-select: none; transition: .12s; box-shadow: var(--shadow);
  }
  .chip:hover { color: var(--ink); border-color: #d4d8df; }
  .chip.active { background: var(--ink); border-color: var(--ink); color: #fff; }

  /* ── Read bar ── */
  .readbar {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 12px 16px; margin: 18px 0 4px; box-shadow: var(--shadow); flex-wrap: wrap;
  }
  .readbar .label { font-size: .9rem; font-weight: 700; color: var(--ink); }
  .readbtn {
    border: 0; background: var(--ink); color: #fff; font-family: inherit; font-weight: 700;
    font-size: .85rem; padding: 9px 16px; border-radius: 10px; cursor: pointer; transition: .12s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .readbtn:hover { background: #3a3d44; }
  .readbtn svg { width: 15px; height: 15px; }

  /* ── Grid & Cards ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 20px; }
  .card {
    position: relative; display: flex; flex-direction: column;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px 20px 18px; box-shadow: var(--shadow); text-decoration: none; color: inherit;
    cursor: pointer; transition: transform .12s ease, box-shadow .12s ease;
    min-height: 150px; overflow: hidden;
  }
  .card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; }
  .card.cat-uiux::before { background: var(--uiux); }
  .card.cat-news::before { background: var(--news); }
  .card.cat-etc::before  { background: var(--etc-bar); }
  .card.cat-news { background: linear-gradient(180deg, #fffdfa 0%, #ffffff 40%); }
  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 14px rgba(20,22,28,.08), 0 16px 36px rgba(20,22,28,.12); }

  .c-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .c-title { font-size: 1.1rem; font-weight: 800; color: var(--ink); letter-spacing: -.01em; word-break: break-all; line-height: 1.3; }
  .c-time { color: var(--muted); font-size: .78rem; font-weight: 600; white-space: nowrap; flex-shrink: 0; margin-top: 3px; }
  .c-date { color: var(--muted); font-size: .76rem; margin-top: 4px; }
  .newdot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--del); margin-left: 7px; vertical-align: middle; }

  .open-btn {
    position: absolute; right: 16px; bottom: 16px; width: 38px; height: 38px; border-radius: 11px;
    background: var(--ink); color: #fff; display: grid; place-items: center; transition: .12s;
  }
  .card:hover .open-btn { background: #3a3d44; transform: scale(1.06); }
  .card.cat-uiux:hover .open-btn { background: var(--uiux); }
  .card.cat-news:hover .open-btn { background: var(--news); }
  .open-btn svg { width: 17px; height: 17px; }

  .tags { display: flex; flex-wrap: wrap; gap: 7px; margin: 14px 0 0; }
  .tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: .76rem; font-weight: 700; padding: 4px 9px 4px 7px; border-radius: 8px;
  }
  .tag svg { width: 13px; height: 13px; }
  .tag.cat-uiux { color: var(--uiux);      background: var(--uiux-soft); }
  .tag.cat-news { color: var(--news-deep); background: var(--news-soft); }
  .tag.cat-etc  { color: #6b7079;          background: var(--soft); }
  .tag.latest, .tag.method, .tag.watch { color: #6b7079; background: var(--soft); }

  .info-note {
    margin: 20px 0 4px; padding: 11px 15px; border-radius: 12px;
    background: var(--soft); border: 1px solid var(--border);
    color: var(--text); font-size: .85rem; line-height: 1.5;
  }
  .info-note b { color: var(--ink); font-weight: 800; }
  .watch-desc { font-size: .85rem; color: var(--muted); margin-top: 12px; padding-right: 44px; }
  .state { text-align: center; color: var(--muted); padding: 70px 16px; }
  .state .big { font-size: 2.2rem; margin-bottom: 12px; filter: grayscale(1); }
  .hidden { display: none !important; }

  /* ── 게시판 (인사이트) ── */
  .board-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 22px 0 4px; flex-wrap: wrap; }
  .board-bar .b-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-primary {
    border: 0; background: var(--ink); color: #fff; font-family: inherit; font-weight: 700;
    font-size: .9rem; padding: 11px 18px; border-radius: 11px; cursor: pointer; transition: .12s;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .btn-primary:hover { background: #3a3d44; transform: translateY(-1px); }
  .btn-primary svg { width: 16px; height: 16px; }
  .btn-ghost {
    border: 1px solid var(--border); background: var(--card); color: var(--text); font-family: inherit;
    font-weight: 600; font-size: .82rem; padding: 9px 13px; border-radius: 10px; cursor: pointer;
    transition: .12s; box-shadow: var(--shadow);
  }
  .btn-ghost:hover { color: var(--ink); border-color: #d4d8df; }

  .post-card .c-title { padding-right: 6px; }
  .post-thumb { width: 100%; height: 140px; object-fit: cover; border-radius: 12px; margin: 14px 0 0; background: var(--soft); border: 1px solid var(--line); }
  .post-preview { color: var(--text); font-size: .9rem; line-height: 1.55; margin-top: 12px;
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  .post-card { min-height: 0; }
  .post-card .c-date { margin-top: 14px; }

  /* ── 오버레이 (에디터 / 뷰어 공용) ── */
  .overlay {
    position: fixed; inset: 0; z-index: 50; background: rgba(20,22,28,.42);
    backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center;
    padding: 24px; overflow-y: auto;
  }
  .panel {
    background: var(--card); border-radius: 20px; width: 100%; max-width: 720px;
    max-height: calc(100vh - 48px); display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(20,22,28,.28); overflow: hidden;
  }
  .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 16px 20px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
  .panel-head .p-title { font-weight: 800; color: var(--ink); font-size: 1rem; }
  .icon-btn { border: 0; background: var(--soft); color: var(--text); width: 34px; height: 34px;
    border-radius: 9px; cursor: pointer; display: grid; place-items: center; transition: .12s; }
  .icon-btn:hover { background: #e4e6ea; color: var(--ink); }
  .icon-btn svg { width: 17px; height: 17px; }
  .panel-body { padding: 18px 20px; overflow-y: auto; flex: 1; }
  .panel-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 14px 20px; border-top: 1px solid var(--line); flex-shrink: 0; flex-wrap: wrap; }

  .ed-title {
    width: 100%; border: 0; outline: 0; font-family: inherit; font-weight: 800; color: var(--ink);
    font-size: 1.5rem; letter-spacing: -.02em; padding: 4px 0 10px; background: none;
  }
  .ed-title::placeholder { color: #c4c8cf; }
  .ed-toolbar { display: flex; gap: 6px; padding: 6px 0 12px; border-bottom: 1px solid var(--line); margin-bottom: 12px; flex-wrap: wrap; }
  .tbtn { border: 1px solid var(--border); background: var(--card); color: var(--text); font-family: inherit;
    font-size: .82rem; font-weight: 700; padding: 6px 11px; border-radius: 8px; cursor: pointer; transition: .12s;
    display: inline-flex; align-items: center; gap: 5px; }
  .tbtn:hover { color: var(--ink); border-color: #d4d8df; background: var(--soft); }
  .tbtn svg { width: 14px; height: 14px; }
  .ed-body {
    min-height: 220px; outline: 0; color: var(--text); font-size: 1rem; line-height: 1.7;
    word-break: break-word;
  }
  .ed-body:empty::before { content: attr(data-ph); color: #c4c8cf; }
  .ed-body img { max-width: 100%; height: auto; border-radius: 10px; margin: 8px 0; display: block; }
  .ed-body.drag { outline: 2px dashed var(--uiux); outline-offset: 6px; border-radius: 8px; }

  /* ── 뷰어 본문 ── */
  .view-body { color: var(--text); font-size: 1rem; line-height: 1.7; word-break: break-word; }
  .view-body img { max-width: 100%; height: auto; border-radius: 10px; margin: 10px 0; display: block; }
  .view-date { color: var(--muted); font-size: .82rem; margin: 2px 0 16px; }
  .view-title { font-size: 1.6rem; font-weight: 800; color: var(--ink); letter-spacing: -.02em; margin: 0 0 4px; line-height: 1.25; }

  .danger { color: var(--del); }
  .btn-ghost.danger:hover { border-color: var(--del-line); background: var(--del-bg); color: var(--del); }

  @media (max-width: 640px) {
    .overlay { padding: 0; }
    .panel { max-width: 100%; max-height: 100%; height: 100%; border-radius: 0; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><span class="logo">▦</span><b>Reference Hub</b></div>
    <h1>UIUX 관련 래퍼런스 및 뉴스레터 모음</h1>
    <div class="sub">UIUX 래퍼런스와 뉴스레터의 변경 사항을 한곳에 모았습니다.</div>

    <div class="tabs">
      <button class="tab active" data-tab="all">전체<span class="n" id="cnt-all">0</span></button>
      <button class="tab" data-tab="changes">변경 내역<span class="n" id="cnt-ch">0</span></button>
      <button class="tab" data-tab="sites">감시 사이트<span class="n" id="cnt-st">0</span></button>
      <button class="tab" data-tab="board">게시판<span class="n" id="cnt-bd">0</span></button>
    </div>

    <div class="filters hidden" id="filters"></div>
    <div id="view"></div>
  </div>

<script>
const TZ = "Asia/Seoul";
const LS_KEY = "siteMonitor:lastSeen";

const CATEGORY = {
  "plusx-experience": "uiux",
  "dfy-work": "uiux",
  "does-web-mobile-platform": "uiux",
  "designcompass-매거진": "news",
  "designcompass-아티클": "news"
};
const CAT_LABEL = { uiux: "UIUX 래퍼런스", news: "뉴스레터", etc: "기타" };
const catOf = n => CATEGORY[n] || "etc";

const ICON_OPEN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M9 7h8v8"/></svg>';
const ICON_PLUS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>';
const ICON_MINUS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M5 12h14"/></svg>';
const ICON_EYE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>';
const ICON_REF = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7l10-4 10 4-10 4z"/><path d="M2 12l10 4 10-4"/><path d="M2 17l10 4 10-4"/></svg>';
const ICON_MAIL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="4.5" width="19" height="15" rx="2.5"/><path d="m3 6 9 7 9-7"/></svg>';
const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';

// 모바일: 같은 탭으로 열어 브라우저 뒤로가기가 동작하게. 데스크톱: 새 탭.
const ON_MOBILE = window.matchMedia("(pointer: coarse)").matches || window.innerWidth < 768;
const LINK_ATTR = ON_MOBILE ? 'target="_self"' : 'target="_blank" rel="noopener noreferrer"';

function fmtTime(iso){const d=new Date(iso);if(isNaN(d))return iso||"";
  return d.toLocaleString("ko-KR",{timeZone:TZ,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false}).replace(/\.\s*/g,m=>m.includes(":")?m:".").replace(/\.$/,"");}
function relTime(iso){const d=new Date(iso),now=new Date(),s=Math.round((now-d)/1000);
  if(isNaN(d)||s<0)return"";if(s<60)return"방금 전";const m=Math.round(s/60);if(m<60)return m+"분 전";
  const h=Math.round(m/60);if(h<24)return h+"시간 전";return Math.round(h/24)+"일 전";}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function host(u){try{return new URL(u).host.replace(/^www\./,"");}catch(e){return u;}}

let CHANGES = [], SITES = [], LATEST = [], activeSite = null, activeTab = "all";
let lastSeen = loadLastSeen();
let readSet = loadRead();   // 내가 클릭해서 본 카드들(개별 읽음)

function loadLastSeen(){try{const v=localStorage.getItem(LS_KEY);return v?new Date(v):new Date(0);}catch(e){return new Date(0);}}
function saveLastSeen(d){try{localStorage.setItem(LS_KEY,d.toISOString());}catch(e){}}
function unread(){return CHANGES.filter(c=>new Date(c.timestamp)>lastSeen);}

// 개별 카드 읽음 상태: 클릭해서 본 카드는 빨간 점을 지운다.
const READ_KEY = "siteMonitor:read";
function cardKey(c){return c.link || c.url || (c.site+"|"+c.timestamp);}
function loadRead(){try{return new Set(JSON.parse(localStorage.getItem(READ_KEY)||"[]"));}catch(e){return new Set();}}
function saveRead(){try{localStorage.setItem(READ_KEY,JSON.stringify([...readSet]));}catch(e){}}
function markRead(key){if(key&&!readSet.has(key)){readSet.add(key);saveRead();}}

function catTag(cat){
  const icon = cat==="news"?ICON_MAIL : cat==="uiux"?ICON_REF : ICON_EYE;
  return `<span class="tag cat-${cat}">${icon} ${CAT_LABEL[cat]}</span>`;
}

function itemCard(c, markNew){
  const cat=catOf(c.site);
  const key=cardKey(c);
  const isNew = markNew && new Date(c.timestamp)>lastSeen && !readSet.has(key);
  const link = c.link || c.url;   // 상세 페이지로 이동
  return `<a class="card cat-${cat}" href="${esc(link)}" data-key="${esc(key)}" ${LINK_ATTR}>
    <div class="c-head">
      <div><div class="c-title">${esc(c.title || c.site)}${isNew?'<span class="newdot" title="새 글"></span>':""}</div>
      <div class="c-date">${esc(fmtTime(c.timestamp))} · ${esc(c.site)}</div></div>
      <div class="c-time">${esc(relTime(c.timestamp))}</div>
    </div>
    <div class="tags">${catTag(cat)}</div>
    <span class="open-btn" aria-label="상세 페이지 열기">${ICON_OPEN}</span>
  </a>`;
}

function linkCard(siteName, item){
  const cat=catOf(siteName);
  return `<a class="card cat-${cat}" href="${esc(item.link)}" ${LINK_ATTR}>
    <div class="c-head"><div><div class="c-title">${esc(item.title)}</div><div class="c-date">${esc(siteName)} · ${esc(host(item.link))}</div></div></div>
    <div class="tags">${catTag(cat)}<span class="tag latest">최신 글</span></div>
    <span class="open-btn" aria-label="링크 열기">${ICON_OPEN}</span>
  </a>`;
}

function siteCard(s){
  const cat=catOf(s.name), method=s.js?"JS 렌더링":"정적 HTML";
  return `<a class="card cat-${cat}" href="${esc(s.url)}" ${LINK_ATTR}>
    <div class="c-head"><div><div class="c-title">${esc(s.name)}</div><div class="c-date">${esc(host(s.url))}</div></div></div>
    <div class="tags">${catTag(cat)}<span class="tag method">${method}</span></div>
    <div class="watch-desc">감시 중인 사이트입니다.</div>
    <span class="open-btn" aria-label="사이트 열기">${ICON_OPEN}</span>
  </a>`;
}

/* 전체가 비었을 때: 사이트별 최신 링크 2개씩(없으면 사이트 카드로 폴백) */
function latestCards(){
  const map={}; LATEST.forEach(e=>{ map[e.site]=(e.items||[]).slice(0,2); });
  let html="";
  if(SITES.length){
    SITES.forEach(s=>{
      const items=map[s.name];
      html += (items&&items.length) ? items.map(it=>linkCard(s.name,it)).join("") : siteCard(s);
    });
  } else {
    LATEST.forEach(e=>{ (e.items||[]).slice(0,2).forEach(it=>{ html+=linkCard(e.site,it); }); });
  }
  return html
    ? `<div class="info-note">아직 감지된 새 글이 없어, 사이트별 <b>최신 글</b>을 대신 보여줍니다. (새 글이 올라오면 여기에 쌓여요)</div><div class="grid">${html}</div>`
    : `<div class="state"><div class="big">✓</div>표시할 항목이 없습니다.</div>`;
}

function renderFilters(){
  const el=document.getElementById("filters");
  const base = activeTab==="all" ? CHANGES : activeTab==="changes" ? unread() : [];
  const sites=[...new Set(base.map(c=>c.site))];
  if((activeTab!=="all"&&activeTab!=="changes")||!CHANGES.length||sites.length<2){el.classList.add("hidden");el.innerHTML="";return;}
  el.classList.remove("hidden");
  el.innerHTML=`<span class="chip${activeSite===null?" active":""}" data-s="">전체</span>`+
    sites.map(s=>`<span class="chip${activeSite===s?" active":""}" data-s="${esc(s)}">${esc(s)}</span>`).join("");
  el.querySelectorAll(".chip").forEach(ch=>ch.onclick=()=>{activeSite=ch.dataset.s||null;renderFilters();renderView();});
}

function renderView(){
  const v=document.getElementById("view");

  if(activeTab==="board"){ renderBoard(); return; }

  if(activeTab==="sites"){
    v.innerHTML = SITES.length ? `<div class="grid">${SITES.map(siteCard).join("")}</div>`
      : `<div class="state">감시 사이트 정보를 불러오지 못했습니다.</div>`;
    return;
  }

  if(activeTab==="all"){
    if(CHANGES.length){
      const items=activeSite?CHANGES.filter(c=>c.site===activeSite):CHANGES;
      v.innerHTML=`<div class="grid">${items.map(c=>itemCard(c,true)).join("")}</div>`;
    } else {
      v.innerHTML=latestCards();   // 새 글 없음 → 사이트별 최신 링크
    }
    return;
  }

  // 변경 내역 = 미확인만
  const list=unread().filter(c=>!activeSite||c.site===activeSite);
  const total=unread().length;
  if(total){
    v.innerHTML=`<div class="readbar"><span class="label">읽지 않은 변경 ${total}건</span>
      <button class="readbtn" id="markRead">${ICON_CHECK} 모두 확인</button></div>
      <div class="grid">${list.map(c=>itemCard(c,true)).join("")}</div>`;
    document.getElementById("markRead").onclick=()=>{
      lastSeen=new Date(); saveLastSeen(lastSeen); activeSite=null; updateCounts(); renderFilters(); renderView();
    };
  } else {
    v.innerHTML=`<div class="state"><div class="big">✓</div>새로 확인할 변경이 없습니다.<br><span style="font-size:.84rem">전체 탭에서 지난 내역을 볼 수 있어요.</span></div>`;
  }
}

function updateCounts(){
  document.getElementById("cnt-all").textContent=CHANGES.length;
  document.getElementById("cnt-ch").textContent=unread().length;
  document.getElementById("cnt-st").textContent=SITES.length;
  document.getElementById("cnt-bd").textContent=POSTS.length;
}

function setTab(t){
  activeTab=t; activeSite=null;
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));
  renderFilters(); renderView();
}

/* ═══════════ 게시판(인사이트) — 브라우저 로컬 저장(IndexedDB) ═══════════ */
const ICON_IMG   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2.5"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="m21 15-5-5L5 21"/></svg>';
const ICON_X     = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>';
const ICON_TRASH = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>';
const ICON_EDIT  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>';

const DB_NAME="siteMonitorBoard", STORE="posts"; let _db=null;
function db(){return new Promise((res,rej)=>{
  if(_db)return res(_db);
  const rq=indexedDB.open(DB_NAME,1);
  rq.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:"id"});};
  rq.onsuccess=e=>{_db=e.target.result;res(_db);};
  rq.onerror=e=>rej(e.target.error);
});}
function idbAll(){return db().then(d=>new Promise((res,rej)=>{const t=d.transaction(STORE,"readonly").objectStore(STORE).getAll();t.onsuccess=()=>res(t.result||[]);t.onerror=()=>rej(t.error);}));}
function idbPut(p){return db().then(d=>new Promise((res,rej)=>{const t=d.transaction(STORE,"readwrite");t.objectStore(STORE).put(p);t.oncomplete=()=>res();t.onerror=()=>rej(t.error);}));}
function idbDel(id){return db().then(d=>new Promise((res,rej)=>{const t=d.transaction(STORE,"readwrite");t.objectStore(STORE).delete(id);t.oncomplete=()=>res();t.onerror=()=>rej(t.error);}));}

let POSTS=[];
async function loadPosts(){try{POSTS=(await idbAll()).sort((a,b)=>(b.updated||0)-(a.updated||0));}catch(e){POSTS=[];}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}

/* 이미지: 최대 1400px·JPEG로 축소해 저장 용량을 아낀다 */
function fileToDataURL(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});}
function downscale(dataUrl,maxDim,quality){return new Promise(res=>{
  const img=new Image();
  img.onload=()=>{let w=img.width,h=img.height;
    if(w>maxDim||h>maxDim){const r=Math.min(maxDim/w,maxDim/h);w=Math.round(w*r);h=Math.round(h*r);}
    const cv=document.createElement("canvas");cv.width=w;cv.height=h;
    const ctx=cv.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);
    try{res(cv.toDataURL("image/jpeg",quality));}catch(e){res(dataUrl);}};
  img.onerror=()=>res(dataUrl);
  img.src=dataUrl;
});}
async function processImageFile(file){return downscale(await fileToDataURL(file),1400,.85);}

/* ── 에디터 ── */
function openEditor(post){
  const ov=document.createElement("div");ov.className="overlay";
  ov.innerHTML=`
    <div class="panel" role="dialog" aria-modal="true">
      <div class="panel-head">
        <span class="p-title">${post?"인사이트 편집":"새 인사이트"}</span>
        <button class="icon-btn" data-x aria-label="닫기">${ICON_X}</button>
      </div>
      <div class="panel-body">
        <input class="ed-title" id="edTitle" placeholder="제목" maxlength="200">
        <div class="ed-toolbar">
          <button class="tbtn" data-cmd="bold" title="굵게"><b>B</b> 굵게</button>
          <button class="tbtn" data-img title="이미지 첨부">${ICON_IMG} 이미지</button>
          <input type="file" data-file accept="image/*" multiple hidden>
        </div>
        <div class="ed-body" id="edBody" contenteditable="true" data-ph="여기에 인사이트를 적어보세요. 이미지는 복사-붙여넣기(Ctrl/⌘+V), 드래그, 또는 위 ‘이미지’ 버튼으로 넣을 수 있어요."></div>
      </div>
      <div class="panel-foot">
        <button class="btn-ghost" data-x>취소</button>
        <button class="btn-primary" data-save>${ICON_CHECK} 저장</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  const $=s=>ov.querySelector(s);
  const titleEl=$("#edTitle"), body=$("#edBody"), fileIn=$("[data-file]");
  if(post){titleEl.value=post.title||"";body.innerHTML=post.html||"";}
  setTimeout(()=>titleEl.focus(),30);

  const close=()=>{document.removeEventListener("keydown",onKey);ov.remove();};
  const onKey=e=>{if(e.key==="Escape")close();};
  document.addEventListener("keydown",onKey);
  ov.querySelectorAll("[data-x]").forEach(b=>b.onclick=close);
  // 에디터는 배경 클릭으로 닫지 않는다(작성 중 내용 보호).

  ov.querySelectorAll(".tbtn[data-cmd]").forEach(b=>b.onmousedown=e=>{e.preventDefault();document.execCommand(b.dataset.cmd,false);body.focus();saveSel();});

  // 커서(선택 영역)를 저장/복원 → 이미지를 '텍스트 사이' 원하는 지점에 넣는다.
  // (첨부 버튼을 누르면 본문 포커스가 풀려 커서를 잃으므로 마지막 위치를 기억해 둔다.)
  let savedRange=null;
  function saveSel(){const s=window.getSelection();if(s&&s.rangeCount&&body.contains(s.anchorNode))savedRange=s.getRangeAt(0).cloneRange();}
  function restoreSel(){body.focus();if(savedRange){const s=window.getSelection();s.removeAllRanges();s.addRange(savedRange);}}
  body.addEventListener("keyup",saveSel);
  body.addEventListener("mouseup",saveSel);
  body.addEventListener("blur",saveSel);

  // 저장해 둔 커서 위치에 이미지를 삽입하고, 다음 삽입이 그 뒤로 이어지도록 위치를 갱신한다.
  const insertImg=src=>{restoreSel();document.execCommand("insertHTML",false,`<img src="${src}" alt="">`);saveSel();};
  $("[data-img]").onclick=()=>fileIn.click();
  fileIn.onchange=async()=>{for(const f of [...fileIn.files]){if(f.type.startsWith("image/"))insertImg(await processImageFile(f));}fileIn.value="";};

  body.addEventListener("paste",async e=>{
    const imgs=[...(e.clipboardData&&e.clipboardData.items||[])].filter(i=>i.type.startsWith("image/"));
    if(imgs.length){e.preventDefault();saveSel();for(const it of imgs){const f=it.getAsFile();if(f)insertImg(await processImageFile(f));}}
  });
  body.addEventListener("dragover",e=>{e.preventDefault();body.classList.add("drag");});
  body.addEventListener("dragleave",()=>body.classList.remove("drag"));
  body.addEventListener("drop",async e=>{e.preventDefault();body.classList.remove("drag");
    const files=[...(e.dataTransfer&&e.dataTransfer.files||[])].filter(f=>f.type.startsWith("image/"));
    if(!files.length)return;
    // 떨어뜨린 지점에 커서를 놓아 그 자리에 이미지가 들어가게 한다.
    let r=null;
    if(document.caretRangeFromPoint)r=document.caretRangeFromPoint(e.clientX,e.clientY);
    else if(document.caretPositionFromPoint){const cp=document.caretPositionFromPoint(e.clientX,e.clientY);if(cp){r=document.createRange();r.setStart(cp.offsetNode,cp.offset);r.collapse(true);}}
    if(r&&body.contains(r.startContainer)){const s=window.getSelection();s.removeAllRanges();s.addRange(r);savedRange=r.cloneRange();}
    else saveSel();
    for(const f of files)insertImg(await processImageFile(f));});

  $("[data-save]").onclick=async()=>{
    const title=titleEl.value.trim(), html=body.innerHTML.trim(), text=body.innerText.trim();
    if(!title && !text && !body.querySelector("img")){close();return;}
    const firstImg=body.querySelector("img"), now=Date.now();
    const rec=post?POSTS.find(p=>p.id===post.id):null;
    const rekord={
      id: post?post.id:uid(),
      title: title || (text.split("\n")[0]||"").slice(0,60) || "제목 없음",
      html, text, thumb: firstImg?firstImg.src:"",
      created: rec?rec.created:now, updated: now
    };
    try{await idbPut(rekord);}catch(e){alert("저장에 실패했어요. 저장 공간이 부족할 수 있으니 이미지 개수를 줄여보세요.");return;}
    await loadPosts();close();updateCounts();if(activeTab==="board")renderBoard();
  };
}

/* ── 뷰어 ── */
function openViewer(id){
  const post=POSTS.find(p=>p.id===id);if(!post)return;
  const ov=document.createElement("div");ov.className="overlay";
  const edited=post.updated&&post.created&&post.updated!==post.created;
  ov.innerHTML=`
    <div class="panel" role="dialog" aria-modal="true">
      <div class="panel-head">
        <span class="p-title">인사이트</span>
        <button class="icon-btn" data-x aria-label="닫기">${ICON_X}</button>
      </div>
      <div class="panel-body">
        <h2 class="view-title">${esc(post.title||"제목 없음")}</h2>
        <div class="view-date">${esc(fmtTime(new Date(post.created).toISOString()))}${edited?" · 수정됨":""}</div>
        <div class="view-body">${post.html||"<span style='color:var(--muted)'>(내용 없음)</span>"}</div>
      </div>
      <div class="panel-foot">
        <button class="btn-ghost danger" data-del>${ICON_TRASH} 삭제</button>
        <button class="btn-primary" data-edit>${ICON_EDIT} 편집</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  const close=()=>{document.removeEventListener("keydown",onKey);ov.remove();};
  const onKey=e=>{if(e.key==="Escape")close();};
  document.addEventListener("keydown",onKey);
  ov.querySelectorAll("[data-x]").forEach(b=>b.onclick=close);
  ov.addEventListener("mousedown",e=>{if(e.target===ov)close();});
  ov.querySelector("[data-edit]").onclick=()=>{close();openEditor(post);};
  ov.querySelector("[data-del]").onclick=async()=>{
    if(!confirm("이 인사이트를 삭제할까요? 되돌릴 수 없어요."))return;
    try{await idbDel(post.id);}catch(e){}
    await loadPosts();close();updateCounts();if(activeTab==="board")renderBoard();
  };
}

/* ── 내보내기 / 가져오기(백업·기기이동) ── */
function exportPosts(){
  if(!POSTS.length){alert("내보낼 인사이트가 없어요.");return;}
  const blob=new Blob([JSON.stringify(POSTS,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="insights-backup-"+new Date().toISOString().slice(0,10)+".json";
  a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
async function importPosts(file){
  if(!file)return;
  try{
    const arr=JSON.parse(await file.text());
    if(!Array.isArray(arr))throw 0;
    let n=0;
    for(const p of arr){if(p&&p.id&&(p.html!=null||p.text!=null||p.title!=null)){await idbPut(p);n++;}}
    await loadPosts();updateCounts();if(activeTab==="board")renderBoard();
    alert(n+"개의 인사이트를 가져왔어요.");
  }catch(e){alert("가져오기에 실패했어요. 올바른 백업 파일(JSON)인지 확인해 주세요.");}
}

/* ── 게시판 화면 ── */
function postCard(p){
  return `<div class="card post-card cat-etc" data-post="${esc(p.id)}">
    <div class="c-head"><div class="c-title">${esc(p.title||"제목 없음")}</div></div>
    ${p.thumb?`<img class="post-thumb" src="${esc(p.thumb)}" alt="">`:""}
    ${p.text?`<div class="post-preview">${esc(p.text)}</div>`:""}
    <div class="c-date">${esc(fmtTime(new Date(p.created).toISOString()))}</div>
  </div>`;
}
function renderBoard(){
  const v=document.getElementById("view");
  const bar=`<div class="board-bar">
      <button class="btn-primary" data-new>${ICON_PLUS} 새 인사이트</button>
      <div class="b-actions">
        <button class="btn-ghost" data-export>내보내기</button>
        <button class="btn-ghost" data-import>가져오기</button>
        <input type="file" data-importfile accept="application/json,.json" hidden>
      </div>
    </div>`;
  const bodyHtml = POSTS.length
    ? `<div class="grid">${POSTS.map(postCard).join("")}</div>`
    : `<div class="state"><div class="big">✎</div>아직 저장한 인사이트가 없어요.<br><span style="font-size:.84rem">‘새 인사이트’를 눌러 마음에 드는 걸 적어보세요.</span></div>`;
  v.innerHTML=bar+bodyHtml;
  v.querySelector("[data-new]").onclick=()=>openEditor(null);
  v.querySelectorAll("[data-post]").forEach(el=>el.onclick=()=>openViewer(el.dataset.post));
  v.querySelector("[data-export]").onclick=exportPosts;
  const imp=v.querySelector("[data-importfile]");
  v.querySelector("[data-import]").onclick=()=>imp.click();
  imp.onchange=()=>importPosts(imp.files[0]).then(()=>imp.value="");
}

async function getJSON(p){const r=await fetch(p+"?t="+Date.now(),{cache:"no-store"});if(!r.ok)throw new Error(p+" HTTP "+r.status);return r.json();}

async function load(){
  const [ch,cfg,lt]=await Promise.allSettled([getJSON("./changes.json"),getJSON("./config.json"),getJSON("./latest.json")]);
  CHANGES=(ch.status==="fulfilled"&&Array.isArray(ch.value)?ch.value:[])
    .filter(c=>c&&c.timestamp).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  SITES=(cfg.status==="fulfilled"&&cfg.value&&Array.isArray(cfg.value.sites))?cfg.value.sites:[];
  LATEST=(lt.status==="fulfilled"&&Array.isArray(lt.value))?lt.value:[];
  await loadPosts();   // 게시판 글(로컬)도 불러와 탭 카운트 표시
  if(ch.status==="rejected"&&cfg.status==="rejected"){
    document.getElementById("view").innerHTML=`<div class="state"><div class="big">!</div>데이터를 불러오지 못했습니다.</div>`;
    return;
  }
  document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
  // 카드를 클릭해서 보면 그 카드만 읽음 처리(빨간 점 즉시 제거 + 저장 → 재방문 시에도 유지)
  document.addEventListener("click",e=>{
    const a=e.target.closest("a.card[data-key]");
    if(!a)return;
    markRead(a.dataset.key);
    const dot=a.querySelector(".newdot"); if(dot)dot.remove();
  },true);
  updateCounts(); renderFilters(); renderView();
}
load();
</script>
