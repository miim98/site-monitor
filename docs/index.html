<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UIUX 래퍼런스 & 뉴스레터 모음</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root {
    --accent: #5b6ef5;       /* UIUX 래퍼런스 (인디고) */
    --accent-soft: #eef0ff;
    --news: #f5910b;         /* 뉴스레터 (주황) */
    --news-deep: #d97706;
    --news-soft: #fff3e0;
    --etc: #b9c0d4;
    --navy: #1f2545;
    --title: #1c2342;
    --text: #2b3252;
    --muted: #8b93ab;
    --card: #ffffff;
    --border: #eceef5;
    --add: #10b981;
    --add-bg: #e7f9f1;
    --add-line: #d3f1e3;
    --del: #f4516c;
    --del-bg: #fff0f2;
    --del-line: #ffd9df;
    --shadow: 0 1px 2px rgba(31,37,69,.04), 0 10px 30px rgba(31,37,69,.07);
    --radius: 20px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    min-height: 100vh; color: var(--text);
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Noto Sans KR", Roboto, sans-serif;
    background:
      radial-gradient(1200px 500px at 15% -8%, #e7ecff 0%, transparent 55%),
      radial-gradient(1100px 520px at 100% 0%, #f6eafe 0%, transparent 50%),
      linear-gradient(180deg, #f4f6fc 0%, #f7f5fb 100%);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 36px 20px 80px; }

  /* ── Header ── */
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .logo {
    width: 34px; height: 34px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--news));
    display: grid; place-items: center; color: #fff; font-size: 18px;
    box-shadow: 0 6px 16px rgba(91,110,245,.3);
  }
  .brand b { font-size: 1.02rem; font-weight: 800; color: var(--navy); letter-spacing: -.01em; }
  h1 { font-size: 1.9rem; font-weight: 800; letter-spacing: -.02em; color: var(--title); margin: 0 0 6px; line-height: 1.25; }
  .sub { color: var(--muted); font-size: .92rem; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 22px; margin: 26px 0 6px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .tab {
    background: none; border: 0; padding: 0 2px 12px; cursor: pointer; font-family: inherit;
    font-size: 1rem; font-weight: 700; color: var(--muted); position: relative; letter-spacing: -.01em;
  }
  .tab.active { color: var(--navy); }
  .tab.active::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 3px;
    background: var(--accent); border-radius: 3px;
  }
  .tab .n { font-size: .76rem; color: var(--accent); font-weight: 800; margin-left: 5px;
    background: var(--accent-soft); padding: 1px 7px; border-radius: 999px; }
  .tab[data-tab="changes"] .n { color: var(--news-deep); background: var(--news-soft); }

  /* ── Filter chips ── */
  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0 4px; }
  .chip {
    border: 1px solid var(--border); background: var(--card); color: var(--muted);
    padding: 7px 13px; border-radius: 999px; font-size: .8rem; font-weight: 600;
    cursor: pointer; user-select: none; transition: .12s; box-shadow: var(--shadow);
  }
  .chip:hover { color: var(--navy); border-color: #d8ddf0; }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 6px 16px rgba(91,110,245,.3); }

  /* ── Read bar (변경 내역) ── */
  .readbar {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 12px 16px; margin: 18px 0 4px; box-shadow: var(--shadow); flex-wrap: wrap;
  }
  .readbar .label { font-size: .9rem; font-weight: 700; color: var(--navy); }
  .readbar .label b { color: var(--news-deep); }
  .readbtn {
    border: 0; background: var(--navy); color: #fff; font-family: inherit; font-weight: 700;
    font-size: .85rem; padding: 9px 16px; border-radius: 10px; cursor: pointer; transition: .12s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .readbtn:hover { background: var(--accent); }
  .readbtn svg { width: 15px; height: 15px; }

  /* ── Grid & Cards ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 20px; }
  .card {
    position: relative; display: flex; flex-direction: column;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px 20px 18px; box-shadow: var(--shadow); text-decoration: none; color: inherit;
    cursor: pointer; transition: transform .12s ease, box-shadow .12s ease;
    min-height: 168px; overflow: hidden;
  }
  .card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; opacity: .95; }
  .card.cat-uiux::before { background: var(--accent); }
  .card.cat-news::before { background: var(--news); }
  .card.cat-etc::before  { background: var(--etc); }
  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 14px rgba(31,37,69,.08), 0 18px 40px rgba(31,37,69,.12); }
  .card.cat-news { background: linear-gradient(180deg, #fffdfa 0%, #ffffff 38%); }

  .c-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .c-title { font-size: 1.12rem; font-weight: 800; color: var(--title); letter-spacing: -.01em; word-break: break-all; line-height: 1.3; }
  .c-time { color: var(--muted); font-size: .78rem; font-weight: 600; white-space: nowrap; flex-shrink: 0; margin-top: 3px; }
  .c-date { color: var(--muted); font-size: .76rem; margin-top: 4px; }
  .newdot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--news); margin-left: 7px; vertical-align: middle; }

  .open-btn {
    position: absolute; right: 16px; bottom: 16px; width: 38px; height: 38px; border-radius: 12px;
    background: var(--navy); color: #fff; display: grid; place-items: center;
    box-shadow: 0 6px 14px rgba(31,37,69,.28); transition: .12s;
  }
  .card.cat-uiux:hover .open-btn { background: var(--accent); }
  .card.cat-news:hover .open-btn { background: var(--news); }
  .card:hover .open-btn { transform: scale(1.06); }
  .open-btn svg { width: 17px; height: 17px; }

  .tags { display: flex; flex-wrap: wrap; gap: 7px; margin: 14px 0 0; }
  .tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: .76rem; font-weight: 700; padding: 4px 9px 4px 7px; border-radius: 8px;
  }
  .tag svg { width: 13px; height: 13px; }
  .tag.add { color: var(--add); background: var(--add-bg); }
  .tag.del { color: var(--del); background: var(--del-bg); }
  .tag.cat-uiux { color: var(--accent); background: var(--accent-soft); }
  .tag.cat-news { color: var(--news-deep); background: var(--news-soft); }
  .tag.cat-etc  { color: var(--muted); background: #f2f4fa; }
  .tag.watch { color: var(--add); background: var(--add-bg); }
  .tag.method { color: var(--muted); background: #f2f4fa; }

  .lines { margin: 12px 0 0; display: flex; flex-direction: column; gap: 8px; padding-right: 44px; }
  .block { border-radius: 10px; padding: 9px 11px; font-size: .83rem; line-height: 1.5; }
  .block.add { background: var(--add-bg); border: 1px solid var(--add-line); }
  .block.del { background: var(--del-bg); border: 1px solid var(--del-line); }
  .ln { display: flex; gap: 7px; align-items: flex-start; }
  .ln + .ln { margin-top: 3px; }
  .ln .mk { font-weight: 800; flex-shrink: 0; line-height: 1.5; }
  .block.add .mk { color: var(--add); }
  .block.del .mk { color: var(--del); }
  .block.del .tx { text-decoration: line-through; color: #b06; opacity: .75; }
  .tx { word-break: break-word; }
  .more { font-size: .76rem; color: var(--muted); margin-top: 5px; font-weight: 600; }

  .empty-note { font-size: .85rem; color: var(--muted); margin: 14px 0 2px; }
  .watch-desc { font-size: .85rem; color: var(--muted); margin-top: 12px; padding-right: 44px; }
  .state { text-align: center; color: var(--muted); padding: 70px 16px; }
  .state .big { font-size: 2.4rem; margin-bottom: 12px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><span class="logo">📚</span><b>Reference Hub</b></div>
    <h1>UIUX 관련 래퍼런스 및 뉴스레터 모음</h1>
    <div class="sub">UIUX 래퍼런스와 뉴스레터의 변경 사항을 한곳에 모았습니다.</div>

    <div class="tabs">
      <button class="tab active" data-tab="all">전체<span class="n" id="cnt-all">0</span></button>
      <button class="tab" data-tab="changes">변경 내역<span class="n" id="cnt-ch">0</span></button>
      <button class="tab" data-tab="sites">감시 사이트<span class="n" id="cnt-st">0</span></button>
    </div>

    <div class="filters hidden" id="filters"></div>
    <div id="view"></div>
  </div>

<script>
const TZ = "Asia/Seoul";
const LS_KEY = "siteMonitor:lastSeen";

/* 카테고리 매핑 */
const CATEGORY = {
  "plusx-experience": "uiux",
  "dfy-work": "uiux",
  "does-web-mobile-platform": "uiux",
  "designcompass-매거진": "news",
  "designcompass-아티클": "news"
};
const CAT_LABEL = { uiux: "UIUX 래퍼런스", news: "뉴스레터", etc: "기타" };
const catOf = n => CATEGORY[n] || "etc";

const ICON_OPEN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M9 7h8v8"/></svg>';
const ICON_PLUS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>';
const ICON_MINUS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M5 12h14"/></svg>';
const ICON_EYE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>';
const ICON_REF = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7l10-4 10 4-10 4z"/><path d="M2 12l10 4 10-4"/><path d="M2 17l10 4 10-4"/></svg>';
const ICON_MAIL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="4.5" width="19" height="15" rx="2.5"/><path d="m3 6 9 7 9-7"/></svg>';
const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';

function fmtTime(iso){const d=new Date(iso);if(isNaN(d))return iso||"";
  return d.toLocaleString("ko-KR",{timeZone:TZ,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false}).replace(/\.\s*/g,m=>m.includes(":")?m:".").replace(/\.$/,"");}
function relTime(iso){const d=new Date(iso),now=new Date(),s=Math.round((now-d)/1000);
  if(isNaN(d)||s<0)return"";if(s<60)return"방금 전";const m=Math.round(s/60);if(m<60)return m+"분 전";
  const h=Math.round(m/60);if(h<24)return h+"시간 전";return Math.round(h/24)+"일 전";}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function host(u){try{return new URL(u).host.replace(/^www\./,"");}catch(e){return u;}}

let CHANGES = [], SITES = [], activeSite = null, activeTab = "all";
let lastSeen = loadLastSeen();

function loadLastSeen(){try{const v=localStorage.getItem(LS_KEY);return v?new Date(v):new Date(0);}catch(e){return new Date(0);}}
function saveLastSeen(d){try{localStorage.setItem(LS_KEY,d.toISOString());}catch(e){}}
function unread(){return CHANGES.filter(c=>new Date(c.timestamp)>lastSeen);}

function catTag(cat){
  const icon = cat==="news"?ICON_MAIL : cat==="uiux"?ICON_REF : ICON_EYE;
  return `<span class="tag cat-${cat}">${icon} ${CAT_LABEL[cat]}</span>`;
}

function changeCard(c, markNew){
  const cat=catOf(c.site);
  const added=(c.added||[]).filter(Boolean), removed=(c.removed||[]).filter(Boolean);
  const badges=[
    added.length?`<span class="tag add">${ICON_PLUS} 추가 ${added.length}</span>`:"",
    removed.length?`<span class="tag del">${ICON_MINUS} 삭제 ${removed.length}</span>`:""
  ].join("");
  let blocks="";
  if(added.length){
    const sh=added.slice(0,5);
    blocks+=`<div class="block add">${sh.map(l=>`<div class="ln"><span class="mk">+</span><span class="tx">${esc(l)}</span></div>`).join("")}${added.length>5?`<div class="more">+${added.length-5}줄 더 추가됨</div>`:""}</div>`;
  }
  if(removed.length){
    const sh=removed.slice(0,3);
    blocks+=`<div class="block del">${sh.map(l=>`<div class="ln"><span class="mk">−</span><span class="tx">${esc(l)}</span></div>`).join("")}${removed.length>3?`<div class="more">−${removed.length-3}줄 더 삭제됨</div>`:""}</div>`;
  }
  const isNew = markNew && new Date(c.timestamp)>lastSeen;
  return `<a class="card cat-${cat}" href="${esc(c.url)}" target="_blank" rel="noopener noreferrer">
    <div class="c-head">
      <div><div class="c-title">${esc(c.site)}${isNew?'<span class="newdot" title="새 변경"></span>':""}</div><div class="c-date">${esc(fmtTime(c.timestamp))}</div></div>
      <div class="c-time">${esc(relTime(c.timestamp))}</div>
    </div>
    <div class="tags">${catTag(cat)}${badges}</div>
    <div class="lines">${blocks}</div>
    <span class="open-btn" aria-label="사이트 열기">${ICON_OPEN}</span>
  </a>`;
}

function siteCard(s){
  const cat=catOf(s.name), method=s.js?"JS 렌더링":"정적 HTML";
  return `<a class="card cat-${cat}" href="${esc(s.url)}" target="_blank" rel="noopener noreferrer">
    <div class="c-head"><div><div class="c-title">${esc(s.name)}</div><div class="c-date">${esc(host(s.url))}</div></div></div>
    <div class="tags">${catTag(cat)}<span class="tag method">${method}</span></div>
    <div class="watch-desc">아직 감지된 변경이 없습니다.</div>
    <span class="open-btn" aria-label="사이트 열기">${ICON_OPEN}</span>
  </a>`;
}

function renderFilters(){
  const el=document.getElementById("filters");
  const base = activeTab==="all" ? CHANGES : activeTab==="changes" ? unread() : [];
  const sites=[...new Set(base.map(c=>c.site))];
  if((activeTab!=="all"&&activeTab!=="changes")||sites.length<2){el.classList.add("hidden");el.innerHTML="";return;}
  el.classList.remove("hidden");
  el.innerHTML=`<span class="chip${activeSite===null?" active":""}" data-s="">전체</span>`+
    sites.map(s=>`<span class="chip${activeSite===s?" active":""}" data-s="${esc(s)}">${esc(s)}</span>`).join("");
  el.querySelectorAll(".chip").forEach(ch=>ch.onclick=()=>{activeSite=ch.dataset.s||null;renderFilters();renderView();});
}

function renderView(){
  const v=document.getElementById("view");

  if(activeTab==="sites"){
    v.innerHTML = SITES.length
      ? `<div class="grid">${SITES.map(siteCard).join("")}</div>`
      : `<div class="state">감시 사이트 정보를 불러오지 못했습니다.</div>`;
    return;
  }

  if(activeTab==="all"){
    if(CHANGES.length){
      const items=activeSite?CHANGES.filter(c=>c.site===activeSite):CHANGES;
      v.innerHTML=`<div class="empty-note">최근 2주간 쌓인 모든 변경 내역입니다.</div><div class="grid">${items.map(c=>changeCard(c,true)).join("")}</div>`;
    } else {
      v.innerHTML=`<div class="empty-note">✅ 아직 기록된 변경이 없습니다. 현재 감시 중인 사이트입니다.</div><div class="grid">${SITES.slice(0,5).map(siteCard).join("")}</div>`;
    }
    return;
  }

  // changes(변경 내역) = 미확인 변경만
  const list=unread().filter(c=>!activeSite||c.site===activeSite);
  const total=unread().length;
  if(total){
    const bar=`<div class="readbar"><span class="label">읽지 않은 변경 <b>${total}</b>건</span>
      <button class="readbtn" id="markRead">${ICON_CHECK} 모두 확인</button></div>`;
    v.innerHTML=bar+`<div class="grid">${list.map(c=>changeCard(c,true)).join("")}</div>`;
    document.getElementById("markRead").onclick=()=>{
      lastSeen=new Date(); saveLastSeen(lastSeen); activeSite=null; updateCounts(); renderFilters(); renderView();
    };
  } else {
    v.innerHTML=`<div class="state"><div class="big">🎉</div>새로 확인할 변경이 없습니다.<br><span style="font-size:.84rem">새 변경이 감지되면 여기에 표시됩니다. (전체 탭에서 지난 내역을 볼 수 있어요)</span></div>`;
  }
}

function updateCounts(){
  document.getElementById("cnt-all").textContent=CHANGES.length;
  document.getElementById("cnt-ch").textContent=unread().length;
  document.getElementById("cnt-st").textContent=SITES.length;
}

function setTab(t){
  activeTab=t; activeSite=null;
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));
  renderFilters(); renderView();
}

async function getJSON(p){const r=await fetch(p+"?t="+Date.now(),{cache:"no-store"});if(!r.ok)throw new Error(p+" HTTP "+r.status);return r.json();}

async function load(){
  const [ch,cfg]=await Promise.allSettled([getJSON("./changes.json"),getJSON("./config.json")]);
  CHANGES=(ch.status==="fulfilled"&&Array.isArray(ch.value)?ch.value:[])
    .filter(c=>c&&c.timestamp).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  SITES=(cfg.status==="fulfilled"&&cfg.value&&Array.isArray(cfg.value.sites))?cfg.value.sites:[];
  if(ch.status==="rejected"&&cfg.status==="rejected"){
    document.getElementById("view").innerHTML=`<div class="state"><div class="big">⚠️</div>데이터를 불러오지 못했습니다.<br><span style="font-size:.82rem">${esc(ch.reason.message)}</span></div>`;
    return;
  }
  document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
  updateCounts(); renderFilters(); renderView();
}
load();
</script>
</body>
</html>
