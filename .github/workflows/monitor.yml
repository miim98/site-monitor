name: site-monitor

on:
  schedule:
    # 매일 아침 9시(KST) 1회 실행. UTC 00:00 = KST 09:00.
    # (깃허브 무료 러너 특성상 몇십 분 지연될 수 있음)
    # 주기를 바꾸려면 아래 cron(UTC 기준) 값만 수정.
    #   '0 * * * *'  -> 매시간   |   '0 */6 * * *' -> 6시간마다
    - cron: '0 0 * * *'
  workflow_dispatch:        # Actions 탭에서 손으로도 실행 가능

permissions:
  contents: write           # 변경분을 레포에 커밋하기 위해 필요

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run monitor
        run: python monitor.py

      - name: Update dashboard data
        run: |
          cp changes.json docs/changes.json
          cp config.json  docs/config.json
          cp latest.json  docs/latest.json

      - name: Commit changes (if any)
        run: |
          git config user.name  "site-monitor-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "monitor: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
