name: site-monitor

on:
  schedule:
    # 매시 정각 실행. 주기를 바꾸려면 아래 cron 값만 수정.
    #   '0 */2 * * *'  -> 2시간마다
    #   '*/30 * * * *' -> 30분마다 (실제론 깃허브 부하에 따라 지연될 수 있음)
    - cron: '0 * * * *'
  workflow_dispatch:        # Actions 탭에서 손으로도 실행 가능

permissions:
  contents: write           # 변경분을 레포에 커밋하기 위해 필요

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run monitor
        run: python monitor.py

      - name: Update dashboard data
        run: cp changes.json docs/changes.json

      - name: Commit changes (if any)
        run: |
          git config user.name  "site-monitor-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "monitor: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
